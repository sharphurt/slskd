throttling:
  search:
    incoming:
      concurrency: 10 # number of search requests to process at the same time
      circuit_breaker: 500 # maximum number of pending search requests

integrations:
  webhooks:
    download-complete-webhook:
      on:
        - Any
      call:
        url: http://192.168.31.200:8080/api/webhook/download/complete
        ignore_certificate_errors: false
        timeout: 5000 # in milliseconds
        retry:
          attempts: 3